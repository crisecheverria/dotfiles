# Display lazygit
bind-key -n C-g display-popup -d '#{pane_current_path}' -w80% -h80% -E lazygit

# Toggle Claude Code popup (C-l opens; C-l again dismisses without killing Claude)
bind-key -n C-l run-shell 'tmux-popup claude claude "#{session_name}" "#{pane_current_path}"'

# Toggle Antigravity CLI popup (C-a opens; C-a again dismisses without killing agy)
bind-key -n C-a run-shell 'tmux-popup agy agy "#{session_name}" "#{pane_current_path}"'

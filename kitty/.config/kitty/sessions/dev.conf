# Development Session
# Launch with: kitty --session ~/.config/kitty/sessions/dev.conf

# Editor tab
new_tab Editor
layout splits
cd ~/projects
launch --title "Editor" $SHELL

# Terminal tab - split layout
new_tab Terminal
layout splits
cd ~/projects
launch --title "Shell" $SHELL
launch --location=vsplit --title "Side" --cwd=current $SHELL

# Logs / monitoring tab
new_tab Logs
layout stack
cd ~/projects
launch --title "Logs" $SHELL

# Focus the editor tab
focus_tab 1

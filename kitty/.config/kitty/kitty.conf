# vim:ft=kitty

# ── Theme ──────────────────────────────────────────────────────────
include current-theme.conf

# ── Font ───────────────────────────────────────────────────────────
font_family      Iosevka Custom Light
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
disable_ligatures never

# Nerd Font icon fallback (Iosevka Custom has no patched icons)
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD MesloLGS Nerd Font Mono

# ── Window / macOS ─────────────────────────────────────────────────
hide_window_decorations titlebar-only
macos_option_as_alt     yes
macos_quit_when_last_window_closed yes
confirm_os_window_close -1
macos_show_window_title_in none

# ── Cursor ─────────────────────────────────────────────────────────
cursor_shape          block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0

# ── Cursor Trail ───────────────────────────────────────────────────
# Enable animated cursor trail (value = ms cursor must be still before trail triggers)
cursor_trail                 3
# Decay speed range: fastest slowest (in seconds)
cursor_trail_decay           0.1 0.4
# Minimum cells the cursor must move to trigger the trail
cursor_trail_start_threshold 2

# ── Mouse ──────────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_style       curly
open_url_with   default
copy_on_select  yes

# ── Scrollback ─────────────────────────────────────────────────────
scrollback_lines 10000

# ── Tabs ───────────────────────────────────────────────────────────
tab_bar_edge        bottom
tab_bar_style       fade
tab_powerline_style slanted
tab_title_template  "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{index}: {title.split(':')[-1].strip() if '@' in title and ':' in title else title}"
active_tab_font_style   bold
inactive_tab_font_style normal

# ── Windows / Splits ───────────────────────────────────────────────
inactive_text_alpha 0.7
enabled_layouts     splits,tall,stack,fat,grid
window_padding_width 4
placement_strategy   center
draw_minimal_borders yes

# ── Bell ───────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell yes

# ── Shell Integration ──────────────────────────────────────────────
shell_integration enabled
notify_on_cmd_finish unfocused 10.0

# ── Remote Control ─────────────────────────────────────────────────
allow_remote_control socket-only
listen_on unix:/tmp/kitty

# ── Sessions ───────────────────────────────────────────────────────
# Auto-load a default session on startup:
startup_session sessions/default.conf
# Open kitty sessions using zoxide and fzf
map ctrl+a>k launch --type=window --bias=25 --location=hsplit $HOME/.local/bin/kitty-zoxide-sessions --auto-close --ansi

# ── Keybindings ────────────────────────────────────────────────────
kitty_mod ctrl+shift

# Window (split) management
map ctrl+shift+\     launch --location=vsplit --cwd=current
map ctrl+shift+/     launch --location=hsplit --cwd=current
map kitty_mod+w      close_window
map kitty_mod+enter  toggle_layout stack

# Navigate kitty splits
map ctrl+shift+left   neighboring_window left
map ctrl+shift+right  neighboring_window right
map ctrl+shift+up     neighboring_window up
map ctrl+shift+down   neighboring_window down

# Navigate Neovim splits
map ctrl+shift+h  send_text all \x17h
map ctrl+shift+j  send_text all \x17j
map ctrl+shift+k  send_text all \x17k
map ctrl+shift+l  send_text all \x17l

# Resize splits (alt added to avoid conflict with navigate arrows above)
map ctrl+shift+alt+left   resize_window narrower 2
map ctrl+shift+alt+right  resize_window wider 2
map ctrl+shift+alt+up     resize_window taller 2
map ctrl+shift+alt+down   resize_window shorter 2

# Tabs
map ctrl+shift+t      new_tab_with_cwd
map ctrl+shift+x      close_tab
map kitty_mod+comma   set_tab_title
map ctrl+shift+1      goto_tab 1
map ctrl+shift+2      goto_tab 2
map ctrl+shift+3      goto_tab 3
map ctrl+shift+4      goto_tab 4
map ctrl+shift+5      goto_tab 5
map ctrl+shift+6      goto_tab 6
map ctrl+shift+7      goto_tab 7
map ctrl+shift+8      goto_tab 8
map ctrl+shift+9      goto_tab 9

# Scrollback (line scroll dropped: ctrl+shift+j/k used for Neovim nav above)
map kitty_mod+u  scroll_page_up
map kitty_mod+i  scroll_page_down

# Font size
map ctrl+equal  change_font_size all +1.0
map ctrl+minus  change_font_size all -1.0
map ctrl+0      change_font_size all 0

# Session switching
map ctrl+f>1  goto_session sessions/default.conf
map ctrl+f>2  goto_session sessions/dev.conf

# Reload config
map kitty_mod+r  load_config_file

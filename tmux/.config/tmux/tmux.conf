# Shared base config — sourced everywhere. Top-level so TPM can discover @plugin lines.
source-file ~/.config/tmux/base.conf
# Arch (omarchy) overrides layer on top of base.
if-shell "test -f /etc/arch-release" "source-file ~/.config/tmux/arch.conf"

set -g status-position bottom

source-file ~/.config/tmux/utility.conf
if-shell '[ ! -f /etc/arch-release ]' "source-file ~/.config/tmux/statusline.conf"

if-shell '[ "$(uname)" = "Darwin" ]' "source-file ~/.config/tmux/macos.conf"
